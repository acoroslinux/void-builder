# Specific configuration for a minimal server build
name: "void-server-minimal"
version: "1.0"

# Minimal packages
packages:
  - htop
  - ufw
  - fail2ban

# Server specific services
services:
  - ufw
  - fail2ban

# Build-specific users
root_password: "server_password"
users:
  - name: "admin"
    password: "admin_password"
    groups: ["wheel"]
    shell: "/bin/bash"
