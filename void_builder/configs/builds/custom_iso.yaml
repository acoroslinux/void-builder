# Specific configuration for the custom ISO build
# This will be merged with the common configuration

name: "void-custom-iso"
version: "1.0"

# Additional packages specific to this build
packages:
  - htop
  - tmux

# Build-specific users
root_password: "voidlinux"
users:
  - name: "void"
    password: "void"
    groups: ["wheel", "audio", "video"]
    shell: "/bin/bash"
